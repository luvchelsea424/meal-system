<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>급식 QR 발급</title>
  <script src="config.js"></script>
  <script src="qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #111; }
    label { display: block; font-size: .85rem; color: #555; margin-bottom: .3rem; margin-top: 1rem; }
    select, input[type=text], input[type=number] {
      width: 100%;
      padding: .6rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    select:focus, input:focus { border-color: #6366f1; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    button[type=submit] {
      margin-top: 1.5rem;
      width: 100%;
      padding: .75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button[type=submit]:hover { background: #4f46e5; }
    button[type=submit]:disabled { background: #a5b4fc; cursor: not-allowed; }
    .error {
      margin-top: 1rem;
      padding: .75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #b91c1c;
      font-size: .9rem;
    }
    /* QR result section */
    #result { display: none; text-align: center; }
    #result h2 { font-size: 1.2rem; margin-bottom: .4rem; color: #111; }
    #result .sub { color: #6b7280; font-size: .85rem; margin-bottom: 1rem; line-height: 1.5; }
    #result .sub.already { color: #f59e0b; font-weight: 600; }
    #qr-canvas { margin: 0 auto 1rem; display: block; }
    #download-btn {
      display: block;
      width: 100%;
      padding: .75rem;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    #download-btn:hover { background: #16a34a; }
    #back-btn {
      display: block;
      width: 100%;
      margin-top: .6rem;
      background: none;
      border: none;
      color: #6b7280;
      font-size: .85rem;
      cursor: pointer;
      text-decoration: underline;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-section">
      <h1>급식 QR 발급</h1>
      <form id="claim-form">
        <label for="grade">학년</label>
        <select id="grade" required>
          <option value="">선택</option>
          <option value="1">1학년</option>
          <option value="2" selected>2학년</option>
          <option value="3">3학년</option>
        </select>

        <div class="row">
          <div>
            <label for="class">반</label>
            <input type="number" id="class" min="1" max="20" placeholder="예: 3" required>
          </div>
          <div>
            <label for="number">번호</label>
            <input type="number" id="number" min="1" max="50" placeholder="예: 15" required>
          </div>
        </div>

        <label for="name">이름</label>
        <input type="text" id="name" placeholder="예: 홍길동" required>

        <button type="submit" id="submit-btn">QR 발급받기</button>
      </form>
      <div id="error-msg" class="error" style="display:none"></div>
    </div>

    <div id="result">
      <h2 id="result-name"></h2>
      <p class="sub" id="result-sub">QR 코드를 저장하여 급식실 입장 시 제시하세요.</p>
      <div id="qr-canvas"></div>
      <button id="download-btn">QR 저장하기</button>
      <button id="back-btn">뒤로 돌아가기</button>
    </div>
  </div>

  <script>
    const form     = document.getElementById('claim-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg  = document.getElementById('error-msg');
    const formSection = document.getElementById('form-section');
    const resultSection = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = '발급 중...';

      const payload = {
        grade:  document.getElementById('grade').value,
        class:  document.getElementById('class').value,
        number: document.getElementById('number').value,
        name:   document.getElementById('name').value.trim(),
      };

      try {
        const params = new URLSearchParams({
          action: 'claim',
          grade:  payload.grade,
          class:  payload.class,
          number: payload.number,
          name:   payload.name,
        });
        const res = await fetch(CONFIG.apiUrl + '?' + params.toString());
        const data = await res.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        showQR(data.token, payload.name, data.alreadyClaimed);
      } catch (err) {
        console.error('claim error:', err);
        showError('서버와 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
      } finally {
        submitBtn.disabled  = false;
        submitBtn.textContent = 'QR 발급받기';
      }
    });

    function showError(msg) {
      errorMsg.textContent    = msg;
      errorMsg.style.display  = 'block';
    }

    function showQR(token, name, alreadyClaimed) {
      const container = document.getElementById('qr-canvas');
      container.innerHTML = '';
      new QRCode(container, { text: token, width: 240, height: 240, correctLevel: QRCode.CorrectLevel.M });

      document.getElementById('result-name').textContent = name + ' 학생의 QR 코드';
      const sub = document.getElementById('result-sub');
      if (alreadyClaimed) {
        sub.textContent = '이미 발급된 QR 코드입니다. 저장하여 급식실 입장 시 제시하세요.';
        sub.classList.add('already');
      } else {
        sub.textContent = 'QR 코드를 저장하여 급식실 입장 시 제시하세요.';
        sub.classList.remove('already');
      }
      formSection.style.display   = 'none';
      resultSection.style.display = 'block';

      document.getElementById('download-btn').onclick = () => {
        const qrCanvas  = container.querySelector('canvas');
        const qrSize    = 240;
        const paddingX  = 60;
        const paddingTop = 24;
        const textAreaH = 48;
        const paddingBot = 48;
        const width  = qrSize + paddingX * 2;
        const height = paddingTop + textAreaH + qrSize + paddingBot;

        const exportCanvas = document.createElement('canvas');
        exportCanvas.width  = width;
        exportCanvas.height = height;
        const ctx = exportCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle  = '#111111';
        ctx.font       = 'bold 18px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign  = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(name + ' 학생의 QR 코드', width / 2, paddingTop + textAreaH / 2);

        ctx.drawImage(qrCanvas, paddingX, paddingTop + textAreaH, qrSize, qrSize);

        const link    = document.createElement('a');
        link.download = '급식QR_' + name + '.png';
        link.href     = exportCanvas.toDataURL('image/png');
        link.click();
      };
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      formSection.style.display   = 'block';
      resultSection.style.display = 'none';
      errorMsg.style.display      = 'none';
    });
  </script>
</body>
</html>
