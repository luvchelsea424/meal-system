<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 급식 QR 코드</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h1 { font-size: 1.3rem; margin-bottom: .5rem; }
    .sub { color: #6b7280; font-size: .9rem; margin-bottom: 1.5rem; }
    canvas { margin: 0 auto 1.25rem; display: block; }
    button {
      padding: .65rem 1.5rem;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #16a34a; }
    .error { color: #b91c1c; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>내 급식 QR 코드</h1>
    <p class="sub">급식실 입장 시 이 QR 코드를 제시하세요.</p>
    <canvas id="qr-canvas"></canvas>
    <button id="download-btn">QR 저장하기</button>
    <p id="error" class="error" style="display:none"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const canvas = document.getElementById('qr-canvas');

    if (!token) {
      document.getElementById('error').textContent = '올바르지 않은 링크입니다.';
      document.getElementById('error').style.display = 'block';
      canvas.style.display = 'none';
      document.getElementById('download-btn').style.display = 'none';
    } else {
      QRCode.toCanvas(canvas, token, { width: 240, margin: 2 }, (err) => {
        if (err) {
          document.getElementById('error').textContent = 'QR 생성 중 오류가 발생했습니다.';
          document.getElementById('error').style.display = 'block';
          return;
        }
        document.getElementById('download-btn').addEventListener('click', () => {
          const link    = document.createElement('a');
          link.download = '급식QR.png';
          link.href     = canvas.toDataURL('image/png');
          link.click();
        });
      });
    }
  </script>
</body>
</html>
